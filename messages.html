<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <title>Messenger Chat</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #fafafa; text-align: center; padding: 50px; }
        .chat-box { background: white; border: 1px solid #dbdbdb; padding: 20px; display: inline-block; width: 300px; text-align: left; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="chat-box">
        <h3>💬 Messenger Chat</h3>
        <a href="/"><- వెనక్కి వెళ్ళు</a>
        <hr>
        <div style="height: 200px; overflow-y: auto;">
            {% if messages %}
                {% for msg in messages %}
                    <p><b>{{ msg[0] }}:</b> {{ msg[1] }}</p>
                {% endfor %}
            {% else %}
                <p>ఇంకా చాట్ మెసేజ్‌లు లేవు...</p>
            {% endif %}
        </div>
        <form action="/send_message" method="POST">
            <input type="text" name="message_text" placeholder="మెసేజ్ టైప్ చెయ్..." required>
            <button type="submit">Send</button>
        </form>
    </div>
</body>
</html>
