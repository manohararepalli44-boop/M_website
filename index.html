<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <title>Instagram Clone</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #fafafa; text-align: center; padding: 50px; }
        .box { background: white; border: 1px solid #dbdbdb; padding: 20px; display: inline-block; border-radius: 8px; }
        a { color: #0095f6; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>📸 నా ఇన్‌స్టాగ్రామ్ హోమ్ పేజీ</h2>
        {% if profile %}
            <p>పోస్ట్‌ల సంఖ్య: {{ profile[0] }}</p>
            <p>ఫాలోవర్స్: {{ profile[1] }}</p>
            <p>ఫాలోయింగ్: {{ profile[2] }}</p>
        {% else %}
            <p>ప్రొఫైల్ డేటా లోడ్ అవ్వలేదు.</p>
        {% endif %}
        <hr>
        <a href="/messenger">💬 చాట్ మెసెంజర్ ఓపెన్ చెయ్</a>
    </div>
</body>
</html>
